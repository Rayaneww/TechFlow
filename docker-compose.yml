services:
  backend:
    image: ${DOCKER_USERNAME:-local}/techflow-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: sqlite:////app/data/techflow.db
      CORS_ORIGINS: "*"
    volumes:
      - db_data:/app/data
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "uv", "run", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    image: ${DOCKER_USERNAME:-local}/techflow-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  db_data:
